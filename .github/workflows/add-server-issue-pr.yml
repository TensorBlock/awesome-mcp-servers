name: MCP Add Server Draft PR

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: mcp-add-server-issue-pr-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  draft-pr:
    name: Draft docs PR from server submission
    if: >-
      contains(github.event.issue.labels.*.name, 'server-submission') ||
      startsWith(github.event.issue.title, 'Add MCP server:') ||
      startsWith(github.event.issue.title, 'Add server:') ||
      (
        startsWith(github.event.issue.title, 'Add ') &&
        (
          contains(github.event.issue.body, 'Project URL') ||
          contains(github.event.issue.body, 'Server URL') ||
          contains(github.event.issue.body, 'Repository') ||
          contains(github.event.issue.body, 'MCP endpoint') ||
          contains(github.event.issue.body, 'Suggested entry')
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve automation token
        id: automation-token
        uses: ./.github/actions/create-automation-token
        with:
          app-client-id: ${{ vars.MCP_AUTOMATION_APP_CLIENT_ID }}
          app-private-key: ${{ secrets.MCP_AUTOMATION_APP_PRIVATE_KEY }}
          fallback-token: ${{ secrets.MCP_AUTOMATION_TOKEN || github.token }}

      - name: Create or update draft PR
        run: node .github/scripts/create-add-server-pr.mjs
        env:
          GITHUB_TOKEN: ${{ steps.automation-token.outputs.token }}
